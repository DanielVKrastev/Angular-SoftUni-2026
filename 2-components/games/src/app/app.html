<div class="app-container">
  <header>
    <h1>{{title}}</h1>

    <nav>
      <button (click)="changeView('home')">Home</button>
      <button (click)="changeView('about')">About</button>
    </nav>

  </header>

  <main>

    @if (currentView === 'home') {
        <app-home />
    }@else if (currentView === 'about') {
        <app-about />
    }
    
  </main>

</div>

<router-outlet />
